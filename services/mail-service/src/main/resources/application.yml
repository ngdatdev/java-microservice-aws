server:
  port: 8083

spring:
  application:
    name: mail-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/mail_db
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# AWS Simulation (LocalStack)
aws:
  region: ${AWS_REGION:ap-northeast-1}
  ses:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    from-email: no-reply@demo.com
  sqs:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    mail-queue-url: http://localhost:4566/000000000000/mail-queue

logging:
  level:
    root: INFO
    com.demo.mail: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG