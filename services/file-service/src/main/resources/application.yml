server:
  port: 8082

spring:
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/file_db
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# AWS Simulation (LocalStack)
aws:
  region: ${AWS_REGION:ap-northeast-1}
  s3:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    bucket-name: demo-bucket
  sns:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    topic-arn: arn:aws:sns:ap-northeast-1:000000000000:global-notifications

logging:
  level:
    root: INFO
    com.demo.file: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG