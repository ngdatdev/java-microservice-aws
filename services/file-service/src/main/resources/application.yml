server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:file_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

aws:
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:demo-uploads}
  sns:
    topic-arn: ${AWS_SNS_FILE_EVENTS_TOPIC_ARN:arn:aws:sns:ap-southeast-1:000000000000:file-events}

logging:
  level:
    root: INFO
    com.demo.file: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: OFF
