# ============================================
# PRODUCTION — for deployed environments
# Uses real AWS Cognito + AWS RDS
# ============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

aws:
  cognito:
    # endpoint: unset → use real AWS (no override)
    # Credentials come from IAM role / environment

logging:
  level:
    com.demo.auth: INFO
    org.hibernate.SQL: OFF
    org.springframework.web: WARN
