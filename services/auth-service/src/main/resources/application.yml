# ============================================================
# Base configuration — ALWAYS loaded before any profile.
# Profile-specific values live in:
#   application-local.yml   (local dev: LocalStack + debug logs)
#   application-prod.yml    (production: real AWS + RDS)
# ============================================================

spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

aws:
  region: ${AWS_REGION:ap-northeast-1}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID}
    client-id: ${COGNITO_CLIENT_ID}
    auth-flow: ADMIN_NO_SRP_AUTH

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  endpoints.web.base-path: /

logging:
  level:
    root: INFO
    com.demo.auth: INFO
    org.springframework.web: WARN