# ============================================================
# Base — ALWAYS loaded before any profile.
# Secrets (password, JWT secret) MUST come from env vars or
# external secrets manager. Never hardcode here.
# ============================================================

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/auth_db
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

aws:
  region: ap-northeast-1
  cognito:
    auth-flow: ADMIN_NO_SRP_AUTH

jwt:
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  endpoints.web.base-path: /

logging:
  level:
    root: INFO
    "[com.demo.auth]": INFO
    "[org.springframework.web]": WARN
