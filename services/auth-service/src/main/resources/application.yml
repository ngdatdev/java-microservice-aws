# ============================================================
# Base — Always loaded.
# Defaults for all environments.
# Sensitive/environment-specific values come from env vars.
# ============================================================

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:auth_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8084}

aws:
  region: ${AWS_REGION:ap-southeast-1}
  cognito:
    auth-flow: ADMIN_NO_SRP_AUTH

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS0zMi1ieXRlcy1sb25nLWZvci10ZXN0aW5n}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  endpoints.web.base-path: /

logging:
  level:
    root: INFO
    "[com.demo.auth]": INFO
    "[org.springframework.web]": WARN
