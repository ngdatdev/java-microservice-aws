server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: master-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:master_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

services:
  member:
    url: ${MEMBER_SERVICE_URL:http://localhost:8081}
  file:
    url: ${FILE_SERVICE_URL:http://localhost:8082}

logging:
  level:
    root: INFO
    com.demo.master: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: OFF
