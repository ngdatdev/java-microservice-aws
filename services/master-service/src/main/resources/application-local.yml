# ============================================================
# LOCAL — for local development
# PostgreSQL must be running locally (docker or installed)
# No AWS SDK — purely REST calls to other services
# ============================================================
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true

logging:
  level:
    "[com.demo.master]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.springframework.web]": INFO
