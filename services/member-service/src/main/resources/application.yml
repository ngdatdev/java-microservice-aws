server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: member-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:member_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

aws:
  region: ${AWS_REGION:ap-southeast-1}
  sns:
    topic-arn: ${AWS_SNS_MEMBER_EVENTS_TOPIC_ARN:arn:aws:sns:ap-southeast-1:000000000000:member-events}
  sqs:
    queue-url: ${AWS_SQS_AUDIT_QUEUE_URL:http://localhost:4566/000000000000/audit-queue}

logging:
  level:
    root: INFO
    com.demo.member: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: OFF
