server:
  port: 8080

spring:
  application:
    name: member-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/member_db
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# AWS Simulation (LocalStack)
aws:
  region: ${AWS_REGION:ap-northeast-1}
  sns:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    topic-arn: arn:aws:sns:ap-northeast-1:000000000000:global-notifications
  sqs:
    endpoint: ${LOCALSTACK_URL:http://localhost:4566}
    queue-url: http://localhost:4566/000000000000/audit-queue

logging:
  level:
    root: INFO
    com.demo.member: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG