name: AWS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  CDK_CONTEXT: env=dev

jobs:
  # =========================================================
  # JOB 1: VERIFY CODE & INFRASTRUCTURE
  # =========================================================
  verify_code:
    name: Verify Code & Synth
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build Microservices
        run: |
          services=("member-service" "file-service" "mail-service" "auth-service" "master-service")
          for svc in "${services[@]}"; do
            echo "==== Building $svc ===="
            cd services/$svc
            mvn clean package -DskipTests
            cd ../..
          done

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            ./frontend/package-lock.json
            ./infra/package-lock.json

      - name: 🏗️ Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: 🔍 CDK Synthesis Validation
        working-directory: ./infra
        run: |
          npm ci
          npx cdk synth --context ${{ env.CDK_CONTEXT }}

  # =========================================================
  # JOB 2: DOCKER BUILD & PUSH LÊN ECR
  # =========================================================
  build_and_push_to_ecr:
    name: Docker Push to Amazon ECR
    needs: verify_code
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17 & Build
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: |
          for svc in "member-service" "file-service" "mail-service" "auth-service" "master-service"; do
            cd services/$svc && mvn clean package -DskipTests && cd ../..
          done

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🚀 Build, tag, and push images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          services=("member-service" "file-service" "mail-service" "auth-service" "master-service")
          for svc in "${services[@]}"; do
            echo "==== Pushing Docker image for $svc ===="
            cd services/$svc
            REPO_NAME="aws-micro-demo/$svc"
            docker build -t $ECR_REGISTRY/$REPO_NAME:latest -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .
            docker push $ECR_REGISTRY/$REPO_NAME:latest
            docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
            cd ../..
          done

  # =========================================================
  # JOB 3: DEPLOY HẠ TẦNG (CDK)
  # =========================================================
  deploy_infrastructure:
    name: Deploy AWS Infrastructure
    needs: build_and_push_to_ecr
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './infra/package-lock.json'

      - name: 📦 Install CDK dependencies
        working-directory: ./infra
        run: |
          npm ci
          npm install -g aws-cdk

      - name: 🚀 Deploy Stacks via CDK
        working-directory: ./infra
        run: |
          cdk deploy --all --require-approval never --context ${{ env.CDK_CONTEXT }}
